<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SMEC Eventos - Scanner</title><script src="https://unpkg.com/@zxing/library@latest"></script><style>body{font-family:Arial;background:#f2f4f8;margin:0;padding:16px;color:#1f2937}.card{max-width:900px;margin:10px auto;background:white;border-radius:18px;padding:20px;text-align:center;box-shadow:0 8px 25px #0001}#video{width:100%;max-width:640px;border-radius:16px;background:#000}select,input{padding:12px;border:1px solid #d1d5db;border-radius:10px;font-size:16px;max-width:450px;width:90%;margin:5px}button{border:0;border-radius:12px;padding:14px 20px;font-size:17px;cursor:pointer;margin:6px}.btn-ok{background:#16a34a;color:white}.btn-cancel{background:#dc2626;color:white}.btn-neutral{background:#0f5f7a;color:white}.sucesso{font-size:30px;font-weight:bold;color:#16a34a;margin:15px}.erro{font-size:22px;color:#dc2626;font-weight:bold;margin:15px}.aviso{font-size:24px;color:#d97706;font-weight:bold;margin:15px}.duplicado{font-size:24px;color:#dc2626;font-weight:bold;margin:15px}.nome{font-size:28px;font-weight:bold;margin:12px}.etapa{font-size:22px;font-weight:bold;background:#eef6f8;border-radius:14px;padding:14px;margin:14px;color:#0f5f7a}.muted{color:#64748b;font-size:13px}</style></head><body><div class="card"><h1>SMEC Eventos - Modo Recepção</h1><div><label><b>URL do Web App:</b></label><br><input id="apiUrl" placeholder="Cole a URL /exec do Apps Script"><button class="btn-neutral" onclick="salvarUrl()">Salvar URL</button></div><div><select id="cameraSelect"></select><button class="btn-neutral" onclick="iniciarCamera()">Iniciar câmera</button><button class="btn-cancel" onclick="pararCamera()">Parar</button></div><video id="video"></video><div><p>Ou digite o código manualmente:</p><input id="codigoManual" placeholder="Ex.: JPP2026-0001"><br><button class="btn-ok" onclick="lerManual()">Registrar manualmente</button></div><div id="resultado"></div><p class="muted">Pode ser usado em vários notebooks/celulares ao mesmo tempo.</p></div><script>let codeReader=null,selectedDeviceId=null,travado=false,codigoPendente='';const DEFAULT_API_URL='COLE_AQUI_A_URL_DO_WEBAPP_EXEC';function apiUrl(){return(localStorage.getItem('SMEC_API_URL')||DEFAULT_API_URL||'').trim().replace('/dev','/exec')}function salvarUrl(){const v=document.getElementById('apiUrl').value.trim().replace('/dev','/exec');if(!v)return alert('Cole a URL do Web App.');localStorage.setItem('SMEC_API_URL',v);alert('URL salva neste aparelho.')}function inicializar(){document.getElementById('apiUrl').value=apiUrl()==='COLE_AQUI_A_URL_DO_WEBAPP_EXEC'?'':apiUrl();codeReader=new ZXing.BrowserQRCodeReader();listarCameras()}function listarCameras(){codeReader.getVideoInputDevices().then(devices=>{const s=document.getElementById('cameraSelect');s.innerHTML='';if(!devices||!devices.length){setResultado('<div class="erro">Nenhuma câmera encontrada.</div>');return}devices.forEach((d,i)=>{const o=document.createElement('option');o.value=d.deviceId;o.text=d.label||('Câmera '+(i+1));s.appendChild(o)});selectedDeviceId=devices[0].deviceId;s.onchange=()=>selectedDeviceId=s.value}).catch(err=>setResultado('<div class="erro">Erro ao listar câmeras:<br>'+err+'</div>'))}function iniciarCamera(){if(!apiUrl()||apiUrl()==='COLE_AQUI_A_URL_DO_WEBAPP_EXEC')return alert('Informe primeiro a URL do Web App.');travado=false;setResultado('<p>Scanner ativo. Aproxime o QR Code.</p>');codeReader.decodeFromVideoDevice(selectedDeviceId,'video',(result,err)=>{if(result&&!travado){travado=true;codigoPendente=extrairCodigo(result.text);analisar(codigoPendente)}})}function pararCamera(){if(codeReader)codeReader.reset()}function extrairCodigo(t){t=String(t||'').trim();const m=t.match(/[?&]codigo=([^&]+)/);return m?decodeURIComponent(m[1]):t}function lerManual(){const v=document.getElementById('codigoManual').value.trim();if(!v)return;travado=true;codigoPendente=extrairCodigo(v);analisar(codigoPendente)}function jsonp(action,params,cb){const name='smec_cb_'+Date.now()+'_'+Math.floor(Math.random()*99999);window[name]=data=>{cb(data);delete window[name];script.remove()};const qs=new URLSearchParams(params||{});qs.set('action',action);qs.set('callback',name);const script=document.createElement('script');script.src=apiUrl()+'?'+qs.toString();script.onerror=()=>{setResultado('<div class="erro">Erro ao conectar com o Apps Script.</div>');voltarDepois()};document.body.appendChild(script)}function analisar(codigo){setResultado('<p>Analisando...</p>');jsonp('analisar',{codigo},mostrarResultado)}function registrar(autorizar){jsonp('registrar',{codigo:codigoPendente,autorizar:autorizar?'true':'false',dispositivo:navigator.userAgent},res=>{if(res.ok&&res.tipo==='REGISTRADO'){setResultado('<div class="sucesso">✔ REGISTRADO</div><div class="nome">'+res.participante.nome+'</div><div class="etapa">'+res.etapa.dia+'<br>'+res.etapa.etapa+'</div><p>'+res.dataHora+'</p><p>'+res.status+'</p>');voltarDepois()}else mostrarResultado(res)})}function mostrarResultado(res){if(!res.ok){if(res.tipo==='DUPLICADO'){setResultado('<div class="duplicado">✖ JÁ REGISTRADO</div><div class="nome">'+res.participante.nome+'</div><div class="etapa">'+res.etapa.dia+'<br>'+res.etapa.etapa+'</div><p>'+res.registro.dataHora+'</p>');voltarDepois();return}setResultado('<div class="erro">'+res.msg+'</div>');voltarDepois();return}const p=res.participante,e=res.etapa;if(res.tipo==='NORMAL'){registrar(false);return}if(res.tipo==='AUTORIZACAO'){let h='<div class="aviso">⚠ ATENÇÃO</div><div class="nome">'+p.nome+'</div><div class="etapa">'+e.dia+'<br>'+e.etapa+'</div>';if(res.alertas.indexOf('FORA_HORARIO')>=0)h+='<p>Este registro está fora do horário previsto.</p>';if(res.alertas.indexOf('PENDENCIA_ANTERIOR')>=0)h+='<p>Etapa anterior não registrada: <b>'+res.etapaAnterior.etapa+'</b></p>';h+='<button class="btn-ok" onclick="registrar(true)">Permitir registro</button><button class="btn-cancel" onclick="cancelar()">Cancelar</button>';setResultado(h)}}function cancelar(){setResultado('<div class="erro">Registro cancelado</div>');voltarDepois()}function voltarDepois(){setTimeout(()=>{document.getElementById('codigoManual').value='';setResultado('<p>Scanner ativo. Aproxime o QR Code.</p>');travado=false},2500)}function setResultado(h){document.getElementById('resultado').innerHTML=h}inicializar();</script></body></html>
