<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SMEC Eventos - Scanner V4</title><script src="https://unpkg.com/html5-qrcode"></script><link rel="stylesheet" href="style.css"></head><body><main class="app"><section class="card"><header><h1>SMEC Eventos</h1><p class="sub">Scanner rápido de credenciamento</p></header><div class="config"><label>URL do Web App Apps Script</label><div class="row"><input id="apiUrl" placeholder="Cole a URL /exec do Apps Script"><button class="btn neutral" onclick="salvarUrl()">Salvar</button></div></div><div class="toolbar"><select id="cameraSelect" title="Câmera"></select><button class="btn neutral" onclick="iniciarScanner()">Iniciar</button><button class="btn danger" onclick="pararScanner()">Parar</button></div><div id="reader" class="reader"></div><div class="manual"><p>Digitação manual</p><input id="codigoManual" placeholder="Ex.: JPP2026-0001" onkeydown="if(event.key==='Enter') lerManual()"><button class="btn ok" onclick="lerManual()">Registrar manualmente</button></div><div id="resultado" class="resultado aguardando"><div class="big">Aproxime o QR Code</div></div><footer>Pode usar em vários notebooks/celulares ao mesmo tempo.</footer></section></main><script src="scanner.js"></script></body></html>
